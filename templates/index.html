<!DOCTYPE html>
<html>
<head>
    <title>GradTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="border-b border-gray-200 bg-white">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <span class="text-xl font-bold">GradTrack</span>
            <span class="text-sm text-gray-500">Find your graduate scheme</span>
        </div>
    </nav>

    <div id="search-form" class="flex flex-col items-center justify-center mt-24 gap-6">
        <h2 class="text-2xl font-semibold">Find your graduate scheme</h2>
        <p class="text-gray-500 text-sm">Tell us about yourself and we'll find the best matches</p>
        <div class="flex flex-col gap-3 w-80">
            <select id="industry-filter" class="border border-gray-300 rounded px-4 py-2">
                <option value="">All Industries</option>
                <option value="Technology">Technology</option>
                <option value="Finance">Finance</option>
                <option value="Legal">Legal</option>
                <option value="Consulting">Consulting</option>
                <option value="Engineering">Engineering</option>
            </select>
            <input id="university" type="text" placeholder="Your university" class="border border-gray-300 rounded px-4 py-2">
            <input id="location" type="text" placeholder="Preferred location" class="border border-gray-300 rounded px-4 py-2">
            <button onclick="handleSearch()" class="bg-blue-500 text-white px-4 py-2 rounded font-medium">
                Find schemes
            </button>
        </div>
    </div>
    
    <div id="filter-bar" style="display:none" class="max-w-4xl mx-auto px-6 mt-8 flex gap-4 items-center">
        <select id="industry-filter-bar" class="border border-gray-300 rounded px-4 py-2 w-64">
            <option value="">All Industries</option>
            <option value="Technology">Technology</option>
            <option value="Finance">Finance</option>
            <option value="Legal">Legal</option>
            <option value="Consulting">Consulting</option>
            <option value="Engineering">Engineering</option>
        </select>
        <button onclick="handleFilter()" class="bg-blue-500 text-white px-4 py-2 rounded">
            Update
        </button>
    </div>
    
    <div class="max-w-4xl mx-auto px-6">
        <div id="schemes-container" class="mt-8 grid grid-cols-1 gap-4">
        </div>
    </div>
    
    <script>

        async function handleSearch() {
            document.getElementById("search-form").style.display = "none"
            document.getElementById("filter-bar").style.display = "flex"
            const industry = document.getElementById("industry-filter").value
            const url = industry ? `/schemes?industry=${industry}` : "/schemes"
            const response = await fetch(url)
            const schemes = await response.json()
            renderSchemes(schemes)
        }

        async function handleFilter() {
            const industry = document.getElementById("industry-filter-bar").value
            const url = industry ? `/schemes?industry=${industry}` : "/schemes"
            const response = await fetch(url)
            const schemes = await response.json()
            renderSchemes(schemes)
        }

        function renderSchemes(schemes) {
            document.getElementById("schemes-container").innerHTML = ""

            schemes.forEach(scheme => {
                const card = document.createElement("div")
                card.className = "bg-white border border-gray-200 rounded-lg p-6 shadow-sm hover:shadow-md transition-shadow"
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm text-gray-500 font-medium">${scheme.company}</p>
                            <h3 class="text-lg font-semibold mt-1">${scheme.scheme_name}</h3>
                            <p class="text-sm text-gray-500 mt-2">${scheme.location} · ${scheme.salary ?? "Salary not listed"}</p>
                        </div>
                        <span class="${scheme.status === 'Open' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} text-xs font-medium px-3 py-1 rounded-full">
                            ${scheme.status}
                        </span>
                    </div>
                    <a href="${scheme.url}" target="_blank" class="inline-block mt-4 text-sm text-blue-600 hover:underline">View scheme →</a>
                `
                document.getElementById("schemes-container").appendChild(card)
            })
        }
    </script>
</body>
</html>
